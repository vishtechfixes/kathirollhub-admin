<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <style>
    body { background: var(--bg); margin: 0; padding: 0; }
    .page { padding: 20px; max-width: 1200px; }
    .pos-grid { display: grid; grid-template-columns: 1.3fr 1fr; gap: 16px; }
    @media(max-width:900px){ .pos-grid { grid-template-columns: 1fr; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); padding: 16px; }
    .card-title { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

    .cust-found { background: var(--bg); border-radius: var(--r-md); padding: 12px 14px; margin-top: 10px; display: none; }
    .cust-found.show { display: block; }

    .item-results { max-height: 280px; overflow-y: auto; margin-top: 10px; }
    .item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: var(--r-sm); cursor: pointer;
      transition: background .12s; margin-bottom: 6px; border: 1px solid var(--border);
    }
    .item-row:hover { background: var(--bg); border-color: var(--blue); }
    .item-row.out { opacity: .45; cursor: not-allowed; }
    .item-row .ir-name { font-size: 13.5px; font-weight: 700; color: var(--txt); }
    .item-row .ir-sub  { font-size: 11px; color: var(--txt3); margin-top: 2px; }
    .item-row .ir-price { font-size: 13px; font-weight: 800; color: var(--txt); flex-shrink: 0; }

    .cart-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .cart-row:last-child { border-bottom: none; }
    .cr-name { flex: 1; font-size: 13.5px; font-weight: 700; color: var(--txt); }
    .cr-variant { font-size: 11px; color: var(--txt3); }
    .qty-ctrl { display: flex; align-items: center; gap: 6px; }
    .qty-btn {
      width: 26px; height: 26px; border-radius: 6px; border: 1.5px solid var(--border);
      background: var(--bg); font-size: 14px; font-weight: 800; cursor: pointer;
      display: flex; align-items: center; justify-content: center; color: var(--txt);
    }
    .qty-val { font-size: 13px; font-weight: 800; min-width: 18px; text-align: center; }
    .cr-price { font-size: 13.5px; font-weight: 800; color: var(--txt); width: 60px; text-align: right; }
    .cr-del { background: none; border: none; cursor: pointer; font-size: 15px; color: var(--red); padding: 2px 4px; }

    .empty-cart { text-align: center; padding: 32px 16px; color: var(--txt3); font-size: 13px; }

    .sum-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13.5px; color: var(--txt2); }
    .sum-row.total { font-size: 18px; font-weight: 800; color: var(--txt); border-top: 1.5px solid var(--border); margin-top: 8px; padding-top: 12px; }
    .sum-row .neg { color: var(--green); }

    .pay-btns { display: flex; gap: 8px; margin-top: 4px; }
    .pay-btn {
      flex: 1; padding: 10px; border-radius: var(--r-sm); border: 1.5px solid var(--border);
      background: var(--bg); font-family: var(--font); font-size: 12.5px; font-weight: 700;
      color: var(--txt2); cursor: pointer; transition: all .15s;
    }
    .pay-btn.on { border-color: var(--yellow); background: #fff8e1; color: #92400e; }

    .offer-chip {
      display: inline-flex; align-items: center; gap: 5px;
      background: #fffbe6; border: 1.5px solid #ffe58f; border-radius: 99px;
      padding: 6px 12px; font-size: 12px; font-weight: 700; color: var(--txt);
      cursor: pointer; margin: 0 6px 6px 0; transition: all .15s;
    }
    .offer-chip.on { background: #f0fdf4; border-color: var(--green); color: #166534; }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 500; display: none; align-items: center; justify-content: center; padding: 16px; }
    .modal-bg.open { display: flex; }
    .modal-card { background: var(--card); border-radius: var(--r-xl); padding: 24px; width: 100%; max-width: 380px; box-shadow: 0 20px 40px rgba(0,0,0,.2); }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--txt); color: var(--card); font-size: 13px; font-weight: 700;
      padding: 10px 20px; border-radius: 99px; z-index: 999; opacity: 0; transition: opacity .3s; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    #cart-success { display: none; text-align: center; padding: 30px 16px; }
  </style>
</head>
<body>
<div class="page">

  <div class="pos-grid">

    <div>
      <div class="card" style="margin-bottom: 14px">
        <div class="card-title">👤 Customer</div>
        <div style="display:flex;gap:8px">
          <input class="inp" type="tel" id="cb-mob" maxlength="10" inputmode="numeric"
            placeholder="Mobile number..." onkeydown="if(event.key==='Enter')cbLookup()"/>
          <button class="btn btn-yellow" onclick="cbLookup()" style="white-space:nowrap">🔍 Find</button>
        </div>
        <div class="cust-found" id="cb-cust-found">
          <div style="font-size:14px;font-weight:700;color:var(--txt)" id="cb-cust-name"></div>
          <div style="font-size:12px;color:var(--txt2);margin-top:2px" id="cb-cust-sub"></div>
          <div id="cb-udhaar-alert" style="display:none;margin-top:8px;background:#fff5f5;border:1.5px solid var(--red);border-radius:var(--r-sm);padding:8px 12px;font-size:12.5px;font-weight:700;color:var(--red)"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">🌯 Menu Items</div>
        <input class="inp" type="text" id="cb-item-search" placeholder="🔍 Item search karo..." oninput="cbFilterItems()"/>
        <div class="item-results" id="cb-item-results"></div>
        <button class="btn btn-ghost btn-full" style="margin-top:10px" onclick="cbOpenCustomItem()">
          ➕ Custom Item Add Karo
        </button>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom: 14px">
        <div class="card-title">🛒 Cart <span id="cb-cart-count" style="color:var(--txt3);font-weight:600"></span></div>
        <div id="cb-cart-list">
          <div class="empty-cart" id="cb-empty-cart">Cart khali hai — item add karo</div>
        </div>
      </div>

      <div class="card" id="cb-offers-card" style="display:none;margin-bottom:14px">
        <div class="card-title">🎁 Available Offers</div>
        <div id="cb-offers-list"></div>
      </div>

      <div class="card" id="cb-summary-section" style="display:none">
        <div class="sum-row"><span>Subtotal</span><span id="cb-subtotal">₹0</span></div>
        <div class="sum-row" id="cb-disc-row" style="display:none"><span>Discount</span><span class="neg" id="cb-disc-amt">-₹0</span></div>
        <div class="sum-row total"><span>Total</span><span id="cb-total">₹0</span></div>

        <div style="margin-top:14px">
          <label class="lbl">Payment</label>
          <div class="pay-btns">
            <button class="pay-btn on" onclick="cbSelPay(this,'cash')">💵 Cash</button>
            <button class="pay-btn"    onclick="cbSelPay(this,'upi')">📲 UPI</button>
            <button class="pay-btn"    onclick="cbSelPay(this,'card')">💳 Card</button>
          </div>
        </div>

        <div style="margin-top:14px">
          <label class="lbl">Amount Paid ₹ (Total se kam dalo agar Udhaar/Partial hai)</label>
          <input class="inp" type="number" id="cb-amt-paid" placeholder="0" oninput="cbUpdatePaymentStatus()"/>
          <div id="cb-payment-status" style="margin-top:8px;display:none"></div>
        </div>

        <button class="btn btn-success btn-full" id="cb-confirm-btn" style="margin-top:16px" onclick="cbConfirm()">
          ✅ Confirm & Save Bill
        </button>
      </div>
    </div>

  </div>

  <!-- Success card — OUTSIDE pos-grid so hiding the grid doesn't hide this -->
  <div class="card" id="cart-success" style="display:none;max-width:480px;margin:0 auto">
    <div style="font-size:48px;margin-bottom:8px;text-align:center">🎉</div>
    <div style="font-size:17px;font-weight:800;color:var(--txt);margin-bottom:4px;text-align:center" id="cs-title">Bill Saved!</div>
    <div style="font-size:13px;color:var(--txt2);margin-bottom:16px;text-align:center" id="cs-sub"></div>

    <!-- Itemized bill summary -->
    <div style="background:var(--bg);border-radius:var(--r-md);padding:14px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">Bill Summary</div>
      <div id="cs-items-list" style="margin-bottom:10px"></div>
      <div style="border-top:1px solid var(--border);padding-top:10px">
        <div class="sum-row"><span>Subtotal</span><span id="cs-subtotal">₹0</span></div>
        <div class="sum-row" id="cs-disc-row" style="display:none"><span>Discount</span><span class="neg" id="cs-disc-amt">-₹0</span></div>
        <div class="sum-row total" style="font-size:16px"><span>Final</span><span id="cs-final">₹0</span></div>
        <div class="sum-row"><span>Payment</span><span id="cs-payment" style="font-weight:700;color:var(--txt)">—</span></div>
        <div class="sum-row"><span>Points Earned</span><span style="font-weight:700;color:var(--green)" id="cs-points">+0</span></div>
        <div class="sum-row" id="cs-due-row" style="display:none"><span>Udhaar Baki</span><span style="font-weight:700;color:var(--red)" id="cs-due-amt">₹0</span></div>
      </div>
    </div>

    <button class="btn btn-ghost btn-full" style="color:var(--green);border-color:var(--green);margin-bottom:8px" onclick="cbWhatsAppReceipt()">📲 WhatsApp Receipt</button>
    <button class="btn btn-ghost btn-full" style="color:var(--blue);border-color:var(--blue);margin-bottom:8px" onclick="cbPrintReceipt()">🖨️ Print Receipt</button>
    <button class="btn btn-yellow btn-full" onclick="cbNewBill()">➕ New Bill</button>
  </div>

  <!-- Success card lives OUTSIDE pos-grid so hiding the grid doesn't hide it -->
</div>

<div class="modal-bg" id="cb-custom-modal" onclick="if(event.target===this)cbCloseCustomItem()">
  <div class="modal-card">
    <div style="font-size:16px;font-weight:800;color:var(--txt);margin-bottom:14px">➕ Custom Item</div>
    <div class="field" style="margin-bottom:12px">
      <label class="lbl">Item Name</label>
      <input class="inp" type="text" id="cb-ci-name" placeholder="e.g. Extra Cheese"/>
    </div>
    <div class="field" style="margin-bottom:14px">
      <label class="lbl">Price ₹</label>
      <input class="inp" type="number" id="cb-ci-price" placeholder="0" min="0"/>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-ghost" style="flex:1" onclick="cbCloseCustomItem()">Cancel</button>
      <button class="btn btn-success" style="flex:2" onclick="cbAddCustomItem()">✅ Cart Mein Add Karo</button>
    </div>
  </div>
</div>

<div class="toast" id="cb-toast"></div>

<script type="module" src="../js/billing.js"></script>
</body>
</html>
