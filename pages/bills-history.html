<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <style>
    body { background: var(--bg); margin: 0; padding: 0; }
    .page { padding: 24px 20px 80px; max-width: 1100px; }

    .stat-strip { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 18px; }
    @media(max-width:640px){ .stat-strip { grid-template-columns: repeat(2,1fr); } }
    .ss { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 14px 16px; box-shadow: var(--shadow-sm); }
    .ss-icon { font-size: 20px; margin-bottom: 8px; display: block; }
    .ss-val { font-size: 24px; font-weight: 800; color: var(--txt); line-height: 1; margin-bottom: 4px; }
    .ss-val.g { color: var(--green); } .ss-val.r { color: var(--red); } .ss-val.y { color: #ca8a04; }
    .ss-lbl { font-size: 12px; color: var(--txt2); font-weight: 600; }

    .search-bar { display: flex; gap: 10px; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); padding: 12px 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 160px; background: none; border: none; outline: none; font-family: var(--font); font-size: 14px; color: var(--txt); }
    .filter-select { background: var(--bg); border: 1.5px solid var(--border); border-radius: var(--r-sm); color: var(--txt); font-family: var(--font); font-size: 13px; font-weight: 600; padding: 7px 12px; outline: none; cursor: pointer; }

    .tbl-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
    .tbl-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .tbl-count { font-size: 13px; color: var(--txt2); font-weight: 500; }

    .status-badge { font-size: 10.5px; font-weight: 800; padding: 3px 10px; border-radius: 99px; white-space: nowrap; }
    .status-badge.paid { background: #dcfce7; color: #166534; }
    .status-badge.pending { background: #fef9c3; color: #92400e; }
    .status-badge.cancelled { background: #fee2e2; color: #991b1b; }

    .empty-state { text-align: center; padding: 48px 24px; color: var(--txt2); }
    .empty-state .ei { font-size: 40px; display: block; margin-bottom: 12px; }

    @media(max-width:700px){ .hide-sm { display: none; } }
  </style>
</head>
<body>
<div class="page">

  <div class="stat-strip" id="bh-stats"></div>

  <div class="search-bar">
    <span style="font-size:16px;color:var(--txt3)">🔍</span>
    <input class="search-input" type="text" id="bh-search" placeholder="Naam ya mobile se search karo..." oninput="bhFilter()"/>
    <select class="filter-select" id="bh-status-filter" onchange="bhFilter()">
      <option value="">Sab Status</option>
      <option value="paid">✅ Paid</option>
      <option value="pending">⏳ Pending</option>
      <option value="cancelled">❌ Cancelled</option>
    </select>
    <select class="filter-select" id="bh-date-filter" onchange="bhFilter()">
      <option value="">Sab Dates</option>
      <option value="today">Aaj</option>
      <option value="week">Pichle 7 din</option>
      <option value="month">Pichle 30 din</option>
    </select>
  </div>

  <div class="tbl-card">
    <div class="tbl-header">
      <div style="font-size:15px;font-weight:700;color:var(--txt)">📋 Saari Bills</div>
      <div class="tbl-count" id="bh-count">Loading...</div>
    </div>
    <div class="tbl-wrap">
      <table>
        <thead><tr>
          <th>Customer</th>
          <th class="hide-sm">Date / Time</th>
          <th>Amount</th>
          <th class="hide-sm">Discount</th>
          <th>Status</th>
          <th class="hide-sm">Payment</th>
          <th>Actions</th>
        </tr></thead>
        <tbody id="bh-tbody"></tbody>
      </table>
    </div>
  </div>

</div>

<div class="toast" id="bh-toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--txt);color:var(--card);font-size:13px;font-weight:700;padding:10px 20px;border-radius:99px;z-index:999;opacity:0;transition:opacity .3s;white-space:nowrap"></div>

<script type="module" src="../js/bills-history.js"></script>
</body>
</html>
