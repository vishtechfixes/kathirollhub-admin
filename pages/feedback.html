<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/admin.css"/>
  <style>
    body { background: var(--bg); margin: 0; padding: 0; }
    .page { padding: 24px 20px 60px; max-width: 960px; }

    /* ── Page header ── */
    .page-header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      flex-wrap: wrap; gap: 12px; margin-bottom: 20px;
    }
    .page-title { font-size: 20px; font-weight: 800; color: var(--txt); }
    .page-sub   { font-size: 13px; color: var(--txt2); margin-top: 3px; }

    /* ── Stat strip ── */
    .stat-strip {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    @media(max-width:600px){ .stat-strip { grid-template-columns: repeat(2,1fr); } }
    .ss {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 14px 16px;
      box-shadow: var(--shadow-sm); position: relative; overflow: hidden;
    }
    .ss-accent { position:absolute;top:0;left:0;right:0;height:3px;border-radius:4px 4px 0 0; }
    .ss-icon   { font-size:20px;margin-bottom:8px;display:block; }
    .ss-val    { font-size:26px;font-weight:800;color:var(--txt);line-height:1;margin-bottom:4px; }
    .ss-val.r  { color:var(--red); }
    .ss-val.y  { color:#ca8a04; }
    .ss-val.g  { color:var(--green); }
    .ss-val.b  { color:var(--blue); }
    .ss-lbl    { font-size:12px;color:var(--txt2);font-weight:600; }

    /* ── Tabs ── */
    .tab-bar {
      display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
    }
    .tab-btn {
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: var(--r-sm); padding: 8px 18px;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      color: var(--txt2); cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 7px;
    }
    .tab-btn.on { background: var(--blue); border-color: var(--blue); color: #fff; }
    .tab-count {
      font-size: 11px; font-weight: 800; padding: 2px 7px;
      border-radius: 99px; background: rgba(255,255,255,.25); color: inherit;
    }
    .tab-btn:not(.on) .tab-count { background: var(--bg); color: var(--txt3); }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 12px 14px;
      box-shadow: var(--shadow-sm); margin-bottom: 16px;
      display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
    }
    .search-wrap {
      display:flex;align-items:center;gap:8px;
      background:var(--bg);border:1px solid var(--border);
      border-radius:var(--r-sm);padding:8px 12px;flex:1;min-width:180px;
    }
    .search-wrap input {
      background:none;border:none;outline:none;
      font-family:var(--font);font-size:13px;color:var(--txt);width:100%;
    }
    .filter-sel {
      background:var(--bg);border:1px solid var(--border);
      border-radius:var(--r-sm);color:var(--txt);
      font-family:var(--font);font-size:13px;font-weight:600;
      padding:8px 12px;outline:none;cursor:pointer;
    }

    /* ── Feedback Cards Grid ── */
    .fb-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    /* ── Feedback Card ── */
    .fb-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-lg); padding: 0;
      box-shadow: var(--shadow-sm); overflow: hidden;
      display: flex; flex-direction: column;
      transition: box-shadow .2s;
    }
    .fb-card:hover { box-shadow: var(--shadow-md); }
    .fb-card.resolved { opacity: .65; }

    /* Left accent bar */
    .fb-accent { height: 4px; flex-shrink: 0; }

    /* Card body */
    .fb-body { padding: 14px 16px 0; flex: 1; }

    /* Type tag */
    .fb-type {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; font-weight: 800; padding: 3px 10px;
      border-radius: 99px; text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 10px;
    }
    .fb-type.complaint  { background: #fee2e2; color: #991b1b; }
    .fb-type.query      { background: #fef9c3; color: #92400e; }
    .fb-type.suggestion { background: #dcfce7; color: #166534; }
    .fb-type.compliment { background: #eff6ff; color: #1e40af; }

    /* Customer row */
    .fb-cust-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
    }
    .fb-ava {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0;
    }
    .fb-cust-name { font-size: 14px; font-weight: 700; color: var(--txt); }
    .fb-cust-mob  { font-size: 11px; color: var(--txt3); margin-top: 2px; }

    /* Message */
    .fb-msg {
      font-size: 13px; color: var(--txt2); line-height: 1.6;
      margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 4;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .fb-msg.expanded { -webkit-line-clamp: unset; }

    /* Rating */
    .fb-rating { font-size: 16px; margin-bottom: 8px; }

    /* Meta row */
    .fb-meta {
      font-size: 11px; color: var(--txt3); font-weight: 600;
      margin-bottom: 12px;
    }

    /* Card footer */
    .fb-footer {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px; flex-wrap: wrap;
    }

    /* Status toggle */
    .status-wrap { display: flex; align-items: center; gap: 8px; }
    .status-lbl {
      font-size: 12px; font-weight: 700;
    }
    .status-lbl.pending  { color: #ca8a04; }
    .status-lbl.resolved { color: var(--green); }

    /* Action buttons */
    .fb-actions { display: flex; gap: 6px; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 56px 20px;
      color: var(--txt2); grid-column: 1/-1;
    }
    .empty-state .ei { font-size: 48px; display: block; margin-bottom: 14px; }
    .empty-state .eh { font-size: 15px; font-weight: 700; color: var(--txt); margin-bottom: 6px; }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--txt); color: var(--card);
      font-size: 13px; font-weight: 700; padding: 10px 20px;
      border-radius: 99px; z-index: 999; opacity: 0; transition: opacity .3s;
      white-space: nowrap; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Detail modal */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      z-index: 500; display: none;
      align-items: center; justify-content: center; padding: 16px;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: var(--card); border-radius: var(--r-xl);
      padding: 26px 22px; width: 100%; max-width: 480px;
      max-height: 90svh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.22);
      animation: popin .2s ease;
    }
    @keyframes popin{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
  </style>
</head>
<body>
<div class="page">

  <!-- ── Page header ── -->
  <div class="page-header">
    <div>
      <div class="page-title">💬 Customer Feedback</div>
      <div class="page-sub">Complaints, Queries aur Suggestions dekho aur resolve karo.</div>
    </div>
    <button class="btn btn-ghost" onclick="loadPage()">↻ Refresh</button>
  </div>

  <!-- ── Stats ── -->
  <div class="stat-strip">
    <div class="ss">
      <div class="ss-accent" style="background:var(--red)"></div>
      <span class="ss-icon">😤</span>
      <div class="ss-val r" id="s-complaint">—</div>
      <div class="ss-lbl">Complaints</div>
    </div>
    <div class="ss">
      <div class="ss-accent" style="background:#ca8a04"></div>
      <span class="ss-icon">❓</span>
      <div class="ss-val y" id="s-query">—</div>
      <div class="ss-lbl">Queries</div>
    </div>
    <div class="ss">
      <div class="ss-accent" style="background:var(--green)"></div>
      <span class="ss-icon">💡</span>
      <div class="ss-val g" id="s-suggestion">—</div>
      <div class="ss-lbl">Suggestions</div>
    </div>
    <div class="ss">
      <div class="ss-accent" style="background:var(--blue)"></div>
      <span class="ss-icon">⏳</span>
      <div class="ss-val b" id="s-pending">—</div>
      <div class="ss-lbl">Pending</div>
    </div>
  </div>

  <!-- ── Tabs ── -->
  <div class="tab-bar">
    <button class="tab-btn on" id="tab-all"        onclick="switchTab('all')">
      📋 Sab <span class="tab-count" id="cnt-all">0</span>
    </button>
    <button class="tab-btn" id="tab-pending"    onclick="switchTab('pending')">
      ⏳ Pending <span class="tab-count" id="cnt-pending">0</span>
    </button>
    <button class="tab-btn" id="tab-complaint"  onclick="switchTab('complaint')">
      😤 Complaints <span class="tab-count" id="cnt-complaint">0</span>
    </button>
    <button class="tab-btn" id="tab-query"      onclick="switchTab('query')">
      ❓ Queries <span class="tab-count" id="cnt-query">0</span>
    </button>
    <button class="tab-btn" id="tab-suggestion" onclick="switchTab('suggestion')">
      💡 Suggestions <span class="tab-count" id="cnt-suggestion">0</span>
    </button>
    <button class="tab-btn" id="tab-resolved"   onclick="switchTab('resolved')">
      ✅ Resolved <span class="tab-count" id="cnt-resolved">0</span>
    </button>
  </div>

  <!-- ── Filter bar ── -->
  <div class="filter-bar">
    <div class="search-wrap">
      <span style="color:var(--txt3)">🔍</span>
      <input type="text" id="search-inp"
        placeholder="Customer naam ya mobile..."
        oninput="applyFilters()"/>
    </div>
    <select class="filter-sel" id="sort-sel" onchange="applyFilters()">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
      <option value="rating-low">Rating: Low to High</option>
      <option value="rating-high">Rating: High to Low</option>
    </select>
  </div>

  <!-- ── Feedback grid ── -->
  <div class="fb-grid" id="fb-grid">
    <div style="grid-column:1/-1;text-align:center;padding:48px;color:var(--txt3);font-size:14px;font-weight:600">
      ⏳ Loading feedback...
    </div>
  </div>

</div><!-- /page -->

<div class="toast" id="toast"></div>

<!-- ── Detail Modal ── -->
<div class="modal-bg" id="detail-modal" onclick="if(event.target===this)closeDetail()">
  <div class="modal-box" id="detail-body"></div>
</div>

<script type="module">
  import {
    getAllFeedback, toggleFeedbackStatus, deleteFeedback,
    initFeedbackFirebase
  } from '../js/feedback.js';
  import { getShopInfo } from '../js/admin.js';

  // ── State ──────────────────────────────────────────────
  let allFeedback = [], filtered = [], curTab = 'all';

  // ── INIT ───────────────────────────────────────────────
  window.loadPage = async function() {
    await initFeedbackFirebase();
    allFeedback = await getAllFeedback();
    renderStats();
    applyFilters();
  };

  loadPage();

  // ── STATS ──────────────────────────────────────────────
  function renderStats() {
    const byType = (t) => allFeedback.filter(f => f.type === t).length;
    const pending = allFeedback.filter(f => f.status !== 'resolved').length;

    setText('s-complaint',  byType('complaint'));
    setText('s-query',      byType('query'));
    setText('s-suggestion', byType('suggestion'));
    setText('s-pending',    pending);

    setText('cnt-all',        allFeedback.length);
    setText('cnt-pending',    pending);
    setText('cnt-complaint',  byType('complaint'));
    setText('cnt-query',      byType('query'));
    setText('cnt-suggestion', byType('suggestion'));
    setText('cnt-resolved',   allFeedback.filter(f => f.status === 'resolved').length);
  }

  // ── TABS ───────────────────────────────────────────────
  window.switchTab = function(tab) {
    curTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b =>
      b.classList.toggle('on', b.id === 'tab-' + tab)
    );
    applyFilters();
  };

  // ── FILTERS ────────────────────────────────────────────
  window.applyFilters = function() {
    const q    = (document.getElementById('search-inp').value || '').toLowerCase();
    const sort = document.getElementById('sort-sel').value;

    filtered = allFeedback.filter(f => {
      // Tab filter
      if (curTab === 'pending')    return f.status !== 'resolved';
      if (curTab === 'resolved')   return f.status === 'resolved';
      if (curTab !== 'all')        return f.type === curTab;
      return true;
    }).filter(f => {
      if (!q) return true;
      return (f.name||'').toLowerCase().includes(q) ||
             (f.mobile||'').includes(q) ||
             (f.message||'').toLowerCase().includes(q);
    });

    // Sort
    filtered.sort((a, b) => {
      if (sort === 'newest')      return new Date(b.time) - new Date(a.time);
      if (sort === 'oldest')      return new Date(a.time) - new Date(b.time);
      if (sort === 'rating-low')  return (a.rating||0) - (b.rating||0);
      if (sort === 'rating-high') return (b.rating||0) - (a.rating||0);
      return 0;
    });

    renderGrid();
  };

  // ── RENDER GRID ────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('fb-grid');

    if (!filtered.length) {
      grid.innerHTML = `<div class="empty-state">
        <span class="ei">${curTab==='resolved'?'✅':'💬'}</span>
        <div class="eh">${curTab==='resolved'?'Koi resolved feedback nahi':'Koi feedback nahi'}</div>
        <p>${curTab==='complaint'?'Koi complaint nahi — sab khush hain! 🎉':'Customers ka feedback yahan dikhega.'}</p>
      </div>`;
      return;
    }

    grid.innerHTML = filtered.map(f => buildCard(f)).join('');
  }

  function buildCard(f) {
    const typeConfig = {
      complaint:  { label:'Complaint',   icon:'😤', accent:'#ef4444' },
      query:      { label:'Query',        icon:'❓', accent:'#f59e0b' },
      suggestion: { label:'Suggestion',  icon:'💡', accent:'#22c55e' },
      compliment: { label:'Compliment',  icon:'😊', accent:'#3b82f6' },
    };
    const tc  = typeConfig[f.type] || { label: f.type||'Feedback', icon:'💬', accent:'#94a3b8' };
    const ava = (f.name||'G')[0].toUpperCase();
    const col = strColor(f.mobile||'x');
    const res = f.status === 'resolved';
    const stars = f.rating ? '⭐'.repeat(Math.min(5, f.rating)) : '';
    const dt  = f.time ? new Date(f.time) : null;
    const dtS = dt ? dt.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const safeId = (f.id||'').replace(/[^a-zA-Z0-9_-]/g,'');

    return `
      <div class="fb-card ${res ? 'resolved' : ''}" id="fbc-${safeId}">
        <div class="fb-accent" style="background:${tc.accent}"></div>
        <div class="fb-body">
          <!-- Type tag -->
          <div class="fb-type ${f.type||'query'}">${tc.icon} ${tc.label}</div>

          <!-- Customer -->
          <div class="fb-cust-row">
            <div class="fb-ava" style="background:${col}">${ava}</div>
            <div>
              <div class="fb-cust-name">${f.name || 'Anonymous'}</div>
              <div class="fb-cust-mob">${f.mobile || '—'}</div>
            </div>
          </div>

          <!-- Rating -->
          ${stars ? `<div class="fb-rating">${stars}</div>` : ''}

          <!-- Message -->
          <div class="fb-msg" id="msg-${safeId}">${f.message || '(No message)'}</div>
          ${(f.message||'').length > 160
            ? `<button onclick="toggleMsg('${safeId}')" style="font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-weight:700;padding:0;margin-bottom:10px">Read more</button>`
            : ''}

          <!-- Meta -->
          <div class="fb-meta">${dtS}</div>
        </div>

        <!-- Footer -->
        <div class="fb-footer">
          <div class="status-wrap">
            <label class="toggle-wrap">
              <input type="checkbox" ${res?'checked':''}
                onchange="doToggle('${safeId}', this.checked)"/>
              <span class="toggle-sl"></span>
            </label>
            <span class="status-lbl ${res?'resolved':'pending'}">
              ${res ? '✅ Resolved' : '⏳ Pending'}
            </span>
          </div>

          <div class="fb-actions">
            ${f.mobile ? `
              <button class="btn btn-ghost btn-sm"
                onclick="waReply('${f.mobile}','${(f.name||'').replace(/'/g,'')}','${(f.message||'').replace(/'/g,'').substring(0,50)}')"
                title="Reply on WhatsApp">
                📲 WA
              </button>` : ''}
            <button class="btn btn-ghost btn-sm"
              onclick="showDetail('${safeId}')"
              title="View full">
              👁️
            </button>
            <button class="btn btn-danger btn-sm"
              onclick="doDelete('${safeId}','${(f.name||'').replace(/'/g,'')}')"
              title="Delete">
              🗑️
            </button>
          </div>
        </div>
      </div>`;
  }

  // ── TOGGLE READ MORE ───────────────────────────────────
  window.toggleMsg = function(id) {
    const el  = document.getElementById('msg-' + id);
    const btn = el?.nextElementSibling;
    if (!el) return;
    el.classList.toggle('expanded');
    if (btn) btn.textContent = el.classList.contains('expanded') ? 'Show less' : 'Read more';
  };

  // ── TOGGLE STATUS ──────────────────────────────────────
  window.doToggle = async function(id, resolved) {
    const f   = allFeedback.find(x => (x.id||'').replace(/[^a-zA-Z0-9_-]/g,'') === id);
    if (!f) return;
    await toggleFeedbackStatus(f.id, resolved ? 'resolved' : 'pending');
    f.status = resolved ? 'resolved' : 'pending';
    renderStats();
    applyFilters();
    showToast(resolved ? '✅ Feedback resolved!' : '⏳ Pending mark kiya');
  };

  // ── DELETE ─────────────────────────────────────────────
  window.doDelete = async function(id, name) {
    if (!confirm(`"${name || 'Is feedback'}" permanently delete karna chahte ho?`)) return;
    const f = allFeedback.find(x => (x.id||'').replace(/[^a-zA-Z0-9_-]/g,'') === id);
    if (!f) return;
    await deleteFeedback(f.id);
    allFeedback = allFeedback.filter(x => x.id !== f.id);
    renderStats();
    applyFilters();
    showToast('✅ Feedback delete ho gaya');
  };

  // ── WHATSAPP REPLY ─────────────────────────────────────
  window.waReply = function(mobile, name, preview) {
    const sh  = getShopInfo();
    const msg = encodeURIComponent(
      `Namaste ${name} ji! 🙏\n\n` +
      `Aapka feedback humne receive kar liya.\n` +
      `"${preview}..."\n\n` +
      `Hum jald hi aapko reply karenge.\n\n` +
      `— ${sh.name || 'Kathi Roll Hub'} Team`
    );
    window.open(`https://wa.me/91${mobile}?text=${msg}`, '_blank');
  };

  // ── DETAIL MODAL ───────────────────────────────────────
  window.showDetail = function(id) {
    const f = allFeedback.find(x => (x.id||'').replace(/[^a-zA-Z0-9_-]/g,'') === id);
    if (!f) return;
    const dt  = f.time ? new Date(f.time) : null;
    const dtS = dt ? dt.toLocaleString('en-IN') : '—';
    const stars = f.rating ? '⭐'.repeat(Math.min(5, f.rating)) : '—';
    const tc  = { complaint:'😤 Complaint', query:'❓ Query', suggestion:'💡 Suggestion', compliment:'😊 Compliment' };
    document.getElementById('detail-body').innerHTML = `
      <div style="font-size:18px;font-weight:800;color:var(--txt);margin-bottom:4px">
        ${tc[f.type]||'💬 Feedback'}
      </div>
      <div style="font-size:12px;color:var(--txt3);margin-bottom:18px">${dtS}</div>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <div style="width:40px;height:40px;border-radius:50%;background:${strColor(f.mobile||'x')};color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800">${(f.name||'G')[0].toUpperCase()}</div>
        <div>
          <div style="font-size:15px;font-weight:700;color:var(--txt)">${f.name||'Anonymous'}</div>
          <div style="font-size:12px;color:var(--txt3)">${f.mobile||'—'}</div>
        </div>
      </div>
      <div style="background:var(--bg);border-radius:var(--r-md);padding:14px;font-size:14px;color:var(--txt2);line-height:1.7;margin-bottom:14px">${f.message||'(No message)'}</div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px">
        <span class="badge badge-gray">Rating: ${stars}</span>
        <span class="badge ${f.status==='resolved'?'badge-green':'badge-yellow'}">${f.status==='resolved'?'✅ Resolved':'⏳ Pending'}</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" style="flex:1" onclick="closeDetail()">Close</button>
        ${f.mobile ? `<button class="btn btn-success" style="flex:2" onclick="waReply('${f.mobile}','${(f.name||'').replace(/'/g,'')}','${(f.message||'').replace(/'/g,'').substring(0,60)}');closeDetail()">📲 Reply on WhatsApp</button>` : ''}
      </div>`;
    document.getElementById('detail-modal').classList.add('open');
  };

  window.closeDetail = function() {
    document.getElementById('detail-modal').classList.remove('open');
  };

  // ── HELPERS ────────────────────────────────────────────
  function strColor(str) {
    let h = 0;
    for (let i=0; i<str.length; i++) h = str.charCodeAt(i)+((h<<5)-h);
    const c = ['#3b82f6','#22c55e','#f97316','#ec4899','#8b5cf6','#06b6d4','#f59e0b','#ef4444'];
    return c[Math.abs(h)%c.length];
  }

  function setText(id, val) { const e=document.getElementById(id); if(e) e.textContent=val; }

  function showToast(msg, dur=2800) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), dur);
  }
</script>
